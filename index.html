<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVYDOVV | LABORATORY 2026</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono&display=swap');
        :root { --b: #000; --w: #fff; --g: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: var(--b); color: var(--w); font-family: 'Space Mono', monospace; overflow-x: hidden; }

        #cursor { position: fixed; width: 10px; height: 10px; background: var(--w); border-radius: 50%; z-index: 10000; pointer-events: none; mix-blend-mode: difference; transition: transform 0.2s; }
        
        .loader { position: fixed; inset: 0; background: var(--b); z-index: 20000; display: flex; align-items: center; justify-content: center; font-family: 'Syncopate'; font-size: 1.5rem; letter-spacing: 5px; }

        header { position: fixed; top: 0; width: 100%; padding: 30px; z-index: 1000; display: flex; justify-content: space-between; font-family: 'Syncopate'; font-size: 0.8rem; }
        header a { color: var(--w); text-decoration: none; margin-left: 20px; opacity: 0.5; transition: 0.3s; }
        header a:hover { opacity: 1; }

        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        .hero-bg-text { position: absolute; font-size: 20vw; font-family: 'Syncopate'; opacity: 0.05; z-index: 1; pointer-events: none; }
        .hero-container { width: 400px; height: 550px; z-index: 2; border: 1px solid var(--g); overflow: hidden; position: relative; }
        .main-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 1s; }
        .hero-container:hover .main-img { filter: grayscale(0); scale: 1.05; }

        .horizontal-section { height: 100vh; background: #050505; }
        .horizontal-wrapper { display: flex; width: 200vw; height: 100vh; align-items: center; padding: 0 10vw; }
        .p-card { width: 450px; margin-right: 15vw; text-align: center; transition: 0.5s; }
        .p-card img { width: 100%; filter: drop-shadow(0 0 30px rgba(255,255,255,0.05)); }
        .p-info { margin-top: 20px; font-family: 'Syncopate'; }
        .price { font-size: 2rem; margin-top: 10px; font-family: 'Space Mono'; color: #555; }

        .lookbook { padding: 100px 5%; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid img { width: 100%; height: 80vh; object-fit: cover; filter: grayscale(1); opacity: 0; transform: translateY(50px); transition: 1s; }
        .grid img.active { opacity: 1; transform: translateY(0); }

        footer { padding: 50px; text-align: center; opacity: 0.2; font-size: 0.6rem; border-top: 1px solid var(--g); }

        /* Glitch effect for Onyx */
        .glitch { position: relative; display: inline-block; }
        .glitch::after { content: attr(data-text); position: absolute; left: 2px; text-shadow: -1px 0 red; top: 0; color: white; background: black; overflow: hidden; clip: rect(0,900px,0,0); animation: noise-anim 2s infinite linear alternate-reverse; }
        @keyframes noise-anim { 0% { clip: rect(10px, 9999px, 20px, 0); } 100% { clip: rect(40px, 9999px, 50px, 0); } }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="loader">DAVYDOVV</div>

    <header>
        <div class="logo">DAVYDOVV</div>
        <nav><a href="#collection">COLLECTION</a><a href="https://instagram.com">INSTAGRAM</a></nav>
    </header>

    <main>
        <section class="hero">
            <h1 class="hero-bg-text">DAVYDOVV</h1>
            <div class="hero-container">
                <img src="./hero.jpg" class="main-img">
            </div>
        </section>

        <section id="collection" class="horizontal-section">
            <div class="horizontal-wrapper">
                <div class="p-card">
                    <img src="./onyx.jpg">
                    <div class="p-info"><h3 class="glitch" data-text="ONYX ZIP-POLO">ONYX ZIP-POLO</h3><div class="price">3500 RUB</div></div>
                </div>
                <div class="p-card">
                    <img src="./white.jpg">
                    <div class="p-info"><h3>WHITE ARCHIVE</h3><div class="price">3333 RUB</div></div>
                </div>
            </div>
        </section>

        <section class="lookbook">
            <div class="grid">
                <img src="./look1.jpg" class="reveal">
                <img src="./look2.jpg" class="reveal">
            </div>
        </section>
    </main>

    <footer>© 2026 DAVYDOVV LABORATORY</footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <script>
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        const cursor = document.querySelector("#cursor");
        document.addEventListener("mousemove", (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
        });

        window.addEventListener('load', () => {
            gsap.to(".loader", { yPercent: -100, duration: 1, ease: "expo.inOut", delay: 1 });
        });

        gsap.registerPlugin(ScrollTrigger);
        const wrapper = document.querySelector(".horizontal-wrapper");
        gsap.to(wrapper, {
            xPercent: -50,
            ease: "none",
            scrollTrigger: {
                trigger: ".horizontal-section",
                pin: true,
                scrub: 1,
                end: () => "+=" + wrapper.offsetWidth
            }
        });

        gsap.utils.toArray('.reveal').forEach(img => {
            ScrollTrigger.create({
                trigger: img,
                start: "top 80%",
                onEnter: () => img.classList.add('active')
            });
        });
    </script>
</body>
</html>
