<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAVYDOVV | LABORATORY 2026</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono&display=swap');
        :root { --b: #000; --w: #fff; --g: #1a1a1a; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--b); color: var(--w); font-family: 'Space Mono', monospace; overflow-x: hidden; width: 100%; }

        /* Скрываем курсор на мобилках */
        #cursor { position: fixed; width: 10px; height: 10px; background: var(--w); border-radius: 50%; z-index: 10000; pointer-events: none; mix-blend-mode: difference; display: none; }
        @media (min-width: 1024px) { #cursor { display: block; } }
        
        .loader { position: fixed; inset: 0; background: var(--b); z-index: 20000; display: flex; align-items: center; justify-content: center; font-family: 'Syncopate'; font-size: 1rem; letter-spacing: 5px; }

        header { position: fixed; top: 0; width: 100%; padding: 20px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; font-family: 'Syncopate'; }
        .logo { font-size: 0.9rem; }
        nav a { color: var(--w); text-decoration: none; margin-left: 15px; opacity: 0.6; font-size: 0.6rem; }

        /* HERO SECTION */
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; padding: 20px; }
        .hero-bg-text { position: absolute; font-size: 18vw; font-family: 'Syncopate'; opacity: 0.05; z-index: 1; pointer-events: none; text-align: center; width: 100%; }
        .hero-container { width: 100%; max-width: 400px; height: 70vh; z-index: 2; border: 1px solid var(--g); overflow: hidden; position: relative; }
        .main-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.8s; }
        
        /* COLLECTION (Mobile First) */
        .horizontal-section { min-height: 100vh; padding: 100px 20px; }
        .horizontal-wrapper { display: flex; flex-direction: column; gap: 80px; align-items: center; }
        
        /* Десктопный режим горизонтального скролла */
        @media (min-width: 1024px) {
            .horizontal-section { height: 100vh; padding: 0; overflow: hidden; }
            .horizontal-wrapper { flex-direction: row; width: 200vw; height: 100vh; padding: 0 10vw; gap: 0; }
            .p-card { width: 450px; margin-right: 15vw; }
        }

        .p-card { width: 100%; max-width: 450px; text-align: center; }
        .p-card img { width: 100%; height: auto; filter: drop-shadow(0 0 30px rgba(255,255,255,0.05)); }
        .p-info { margin-top: 20px; font-family: 'Syncopate'; }
        .p-info h3 { font-size: 1.2rem; margin-bottom: 5px; }
        .price { font-size: 1.5rem; color: #777; font-family: 'Space Mono'; }

        /* LOOKBOOK */
        .lookbook { padding: 50px 10px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media (min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }
        .grid img { width: 100%; height: 60vh; object-fit: cover; filter: grayscale(1); transition: 0.6s; }

        footer { padding: 40px; text-align: center; opacity: 0.3; font-size: 0.5rem; border-top: 1px solid var(--g); letter-spacing: 2px; }

        .glitch { position: relative; }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="loader">DAVYDOVV</div>

    <header>
        <div class="logo">DAVYDOVV</div>
        <nav><a href="#collection">COLLECTION</a><a href="#">BAG [0]</a></nav>
    </header>

    <main>
        <section class="hero">
            <h1 class="hero-bg-text">DAVYDOVV</h1>
            <div class="hero-container">
                <img src="hero.jpg" class="main-img" onerror="this.src='https://via.placeholder.com/400x600/000000/FFFFFF?text=PHOTO+NOT+FOUND'">
            </div>
        </section>

        <section id="collection" class="horizontal-section">
            <div class="horizontal-wrapper">
                <div class="p-card">
                    <img src="onyx-polo.jpg" onerror="this.src='https://via.placeholder.com/400x600/000000/FFFFFF?text=ONYX+PHOTO'">
                    <div class="p-info"><h3 class="glitch">ONYX ZIP-POLO</h3><div class="price">3500 RUB</div></div>
                </div>
                <div class="p-card">
                    <img src="white-polo.jpg" onerror="this.src='https://via.placeholder.com/400x600/000000/FFFFFF?text=WHITE+PHOTO'">
                    <div class="p-info"><h3>WHITE ARCHIVE</h3><div class="price">3333 RUB</div></div>
                </div>
            </div>
        </section>

        <section class="lookbook">
            <div class="grid">
                <img src="look1.jpg">
                <img src="look2.jpg">
            </div>
        </section>
    </main>

    <footer>© 2026 DAVYDOVV LABORATORY</footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <script>
        // Детект мобилки
        const isMobile = window.innerWidth < 1024;

        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        // Курсор только для ПК
        if(!isMobile) {
            const cursor = document.querySelector("#cursor");
            document.addEventListener("mousemove", (e) => {
                gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
            });
        }

        window.addEventListener('load', () => {
            gsap.to(".loader", { yPercent: -100, duration: 0.8, ease: "expo.inOut", delay: 0.5 });
        });

        // Горизонтальный скролл только для ПК
        if(!isMobile) {
            gsap.registerPlugin(ScrollTrigger);
            const wrapper = document.querySelector(".horizontal-wrapper");
            gsap.to(wrapper, {
                xPercent: -50,
                ease: "none",
                scrollTrigger: {
                    trigger: ".horizontal-section",
                    pin: true,
                    scrub: 1,
                    end: () => "+=" + wrapper.offsetWidth
                }
            });
        }
    </script>
</body>
</html>
