<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVYDOVV | 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
</head>
<body>
    <div id="cursor"></div>

    <div class="loader">
        <div class="loader-text">DAVYDOVV LOADING...</div>
        <div class="progress-bar"><div class="progress"></div></div>
    </div>

    <header>
        <div class="logo">DAVYDOVV</div>
        <nav>
            <a href="#manifesto">MANIFESTO</a>
            <a href="#collection">COLLECTION</a>
            <a href="#">BAG (0)</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1 class="hero-bg-text">DAVYDOVV</h1>
            <div class="hero-container">
                <img src="./hero.jpg" alt="Hero" class="main-img">
            </div>
            <div class="hero-label">ARCHIVE / STRUCTURE</div>
        </section>

        <section id="manifesto" class="manifesto">
            <p class="reveal-text">
                LIMITED EDITION <br>
                <span>LABORATORY 2026</span> <br>
                DESIGNED BY AI
            </p>
        </section>

        <section id="collection" class="horizontal-section">
            <div class="horizontal-wrapper">
                <div class="p-card">
                    <img src="./white-polo.jpg" alt="White Polo">
                    <div class="p-info">
                        <h3>ZIP-POLO / WHITE</h3>
                        <p class="price">3333 RUB</p>
                    </div>
                </div>
                <div class="p-card onyx">
                    <div class="sparkle-layer"></div>
                    <img src="./onyx-polo.jpg" alt="Onyx Polo">
                    <div class="p-info">
                        <h3 class="glitch" data-text="ONYX / RHINESTONES">ONYX / RHINESTONES</h3>
                        <p class="price">3500 RUB</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="lookbook">
            <div class="lookbook-title">LOOKBOOK</div>
            <div class="grid">
                <img src="./look1.jpg" class="reveal">
                <img src="./look2.jpg" class="reveal">
                <img src="./look3.jpg" class="reveal">
                <img src="./look4.jpg" class="reveal">
            </div>
        </section>
    </main>

    <footer>
        <div class="f-logo">DAVYDOVV</div>
        <p>© 2026 BUILT BY AI FOR THE CHOSEN ONES</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
