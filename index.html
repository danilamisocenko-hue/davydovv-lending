<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAVYDOVV | LABORATORY 2026</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono&display=swap');
    </style>
    
    <style>
        :root { --b: #000; --w: #fff; --g: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--b); color: var(--w); font-family: 'Space Mono', monospace; overflow-x: hidden; width: 100%; -webkit-text-size-adjust: 100%; }

        header { 
            position: fixed; top: 0; width: 100%; padding: 20px; 
            z-index: 1000; display: flex; justify-content: space-between; 
            font-family: 'Syncopate'; background: linear-gradient(180deg, black 0%, transparent 100%);
        }
        .logo { font-size: 0.8rem; letter-spacing: 3px; }
        nav { display: flex; gap: 15px; }
        nav a { color: var(--w); text-decoration: none; font-size: 0.6rem; opacity: 0.5; }

        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; padding: 100px 20px 20px; }
        .hero-container { width: 100%; max-width: 400px; height: 100%; border: 1px solid #222; overflow: hidden; position: relative; z-index: 2; }
        .hero-container img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); }

        footer { padding: 40px; text-align: center; font-size: 0.5rem; opacity: 0.3; border-top: 1px solid #111; letter-spacing: 1px;}
    </style>

    <style>
        /* Скроем ПК-блоки по умолчанию */
        #cursor, .hero-bg-text { display: none; }

        .collection-mobile { padding: 60px 15px; }
        .mobile-wrapper { display: flex; flex-direction: column; gap: 60px; align-items: center; }
        
        .p-card { width: 100%; max-width: 450px; text-align: center; }
        .p-card img { width: 100%; height: auto; border: 1px solid #1a1a1a; margin-bottom: 15px; display: block;}
        .p-info h3 { font-family: 'Syncopate'; font-size: 0.9rem; margin-bottom: 5px; text-transform: uppercase; }
        .price { font-size: 1.2rem; color: #555; }

        .lookbook-mobile { padding: 40px 10px; }
        .grid-mobile { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .grid-mobile img { width: 100%; height: 60vh; object-fit: cover; filter: grayscale(1); border: 1px solid #1a1a1a; }
        
        /* Скроем Мобильную версию на ПК */
        @media (min-width: 1024px) {
            .collection-mobile, .lookbook-mobile { display: none; }
        }
    </style>

    <style>
        @media (min-width: 1024px) {
            #cursor { position: fixed; width: 10px; height: 10px; background: var(--w); border-radius: 50%; z-index: 10000; pointer-events: none; mix-blend-mode: difference; display: block; }
            header { padding: 30px 40px; }
            .logo { font-size: 1rem; }
            nav { gap: 30px; }
            nav a { font-size: 0.8rem; }
            
            .hero { padding: 0; }
            .hero-bg-text { display: block; position: absolute; font-size: 20vw; font-family: 'Syncopate'; opacity: 0.05; z-index: 1; pointer-events: none; }
            .hero-container { height: 75vh; }
            
            /* Горизонтальный скролл на ПК */
            .horizontal-section { height: 100vh; overflow: hidden; position: relative; width: 100%; display: block;}
            .horizontal-wrapper { display: flex; flex-direction: row; width: 200vw; height: 100vh; align-items: center; padding: 0 10vw; }
            .p-card-pc { width: 450px; margin-right: 15vw; text-align: center; }
            .p-card-pc img { width: 100%; border: 1px solid #1a1a1a; margin-bottom: 15px; }
            
            .lookbook-pc { padding: 60px 5%; }
            .grid-pc { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
            .grid-pc img { width: 100%; height: 80vh; object-fit: cover; filter: grayscale(1); border: 1px solid #1a1a1a; }
        }
        
        /* Скроем ПК-версию на Мобилках */
        @media (max-width: 1023px) {
            .horizontal-section, .lookbook-pc { display: none; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <header>
        <div class="logo">DAVYDOVV</div>
        <nav><a href="#manifesto">MANIFESTO</a><a href="#">INSTAGRAM</a></nav>
    </header>

    <main>
        <section class="hero">
            <h1 class="hero-bg-text">DAVYDOVV</h1>
            <div class="hero-container">
                <img src="./hero.jpg" alt="main_archive">
            </div>
        </section>

        <section class="horizontal-section">
            <div class="horizontal-wrapper">
                <div class="p-card-pc">
                    <img src="./onyx.jpg" alt="onyx">
                    <div class="p-info"><h3>ONYX ZIP-POLO</h3><div class="price">3500 RUB</div></div>
                </div>
                <div class="p-card-pc">
                    <img src="./white.jpg" alt="white">
                    <div class="p-info"><h3>WHITE ARCHIVE</h3><div class="price">3333 RUB</div></div>
                </div>
            </div>
        </section>

        <section class="lookbook-pc">
            <div class="grid-pc">
                <img src="./look1.jpg">
                <img src="./look2.jpg">
            </div>
        </section>

        <section id="manifesto" class="collection-mobile">
            <div class="mobile-wrapper">
                <div class="p-card">
                    <img src="./onyx.jpg">
                    <div class="p-info"><h3>ONYX ZIP-POLO</h3><div class="price">3500 RUB</div></div>
                </div>
                <div class="p-card">
                    <img src="./white.jpg">
                    <div class="p-info"><h3>WHITE ARCHIVE</h3><div class="price">3333 RUB</div></div>
                </div>
            </div>
        </section>

        <section class="lookbook-mobile">
            <div class="grid-mobile">
                <img src="./look1.jpg">
                <img src="./look2.jpg">
            </div>
        </section>
    </main>

    <footer>© 2026 DAVYDOVV LABORATORY</footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <script>
        const isDesktop = window.innerWidth >= 1024;

        // Плавный скролл (ТОЛЬКО ПК)
        if(isDesktop) {
            const lenis = new Lenis();
            function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
            requestAnimationFrame(raf);

            const cursor = document.querySelector("#cursor");
            document.addEventListener("mousemove", (e) => {
                gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
            });
            
            // Горизонтальный скролл (ТОЛЬКО ПК)
            gsap.registerPlugin(ScrollTrigger);
            const wrapper = document.querySelector(".horizontal-wrapper");
            gsap.to(wrapper, {
                xPercent: -50,
                ease: "none",
                scrollTrigger: {
                    trigger: ".horizontal-section",
                    pin: true,
                    scrub: 1,
                    end: () => "+=" + wrapper.offsetWidth
                }
            });
        }
    </script>
</body>
</html>
