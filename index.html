<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAVYDOVV | 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono&display=swap');
        :root { --b: #000; --w: #fff; --g: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--b); color: var(--w); font-family: 'Space Mono', monospace; overflow-x: hidden; width: 100%; }

        header { position: fixed; top: 0; width: 100%; padding: 20px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; font-family: 'Syncopate'; background: linear-gradient(180deg, black 80%, transparent); }
        .logo { font-size: 0.8rem; letter-spacing: 2px; }
        nav a { color: var(--w); text-decoration: none; margin-left: 15px; opacity: 0.6; font-size: 0.6rem; }

        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; padding: 20px; }
        .hero-container { width: 100%; max-width: 400px; height: 75vh; border: 1px solid var(--g); overflow: hidden; position: relative; z-index: 2; }
        .main-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); }

        .collection { padding: 40px 15px; }
        .wrapper { display: flex; flex-direction: column; gap: 40px; align-items: center; }
        
        .p-card { width: 100%; max-width: 400px; text-align: center; }
        .p-card img { width: 100%; height: auto; border: 1px solid var(--g); display: block; }
        .p-info { margin-top: 15px; font-family: 'Syncopate'; }
        .p-info h3 { font-size: 0.9rem; margin-bottom: 5px; }
        .price { font-size: 1.2rem; color: #555; }

        .grid { display: grid; grid-template-columns: 1fr; gap: 10px; padding: 10px; }
        .grid img { width: 100%; height: 50vh; object-fit: cover; filter: grayscale(1); border: 1px solid var(--g); }

        footer { padding: 40px; text-align: center; opacity: 0.3; font-size: 0.5rem; border-top: 1px solid var(--g); }

        @media (min-width: 768px) {
            .wrapper { flex-direction: row; justify-content: center; flex-wrap: wrap; gap: 60px; }
            .p-card { width: 40%; }
            .grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">DAVYDOVV</div>
        <nav><a href="#collection">COLLECTION</a><a href="#">BAG [0]</a></nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-container">
                <img src="./hero.jpg" class="main-img">
            </div>
        </section>

        <section id="collection" class="collection">
            <div class="wrapper">
                <div class="p-card">
                    <img src="./onyx.jpg">
                    <div class="p-info"><h3>ONYX ZIP-POLO</h3><div class="price">3500 RUB</div></div>
                </div>
                <div class="p-card">
                    <img src="./white.jpg">
                    <div class="p-info"><h3>WHITE ARCHIVE</h3><div class="price">3333 RUB</div></div>
                </div>
            </div>
        </section>

        <section class="lookbook">
            <div class="grid">
                <img src="./look1.jpg">
                <img src="./look2.jpg">
            </div>
        </section>
    </main>

    <footer>© 2026 DAVYDOVV LABORATORY</footer>

</body>
</html>
