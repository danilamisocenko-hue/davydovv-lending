<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVYDOVV | 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
</head>
<body>
    <div id="cursor"></div>
    <div class="loader"><div class="loader-text">DAVYDOVV...</div></div>

    <header>
        <div class="logo">DAVYDOVV</div>
        <nav><a href="#collection">COLLECTION</a><a href="#">BAG [0]</a></nav>
    </header>

    <main>
        <section class="hero">
            <h1 class="hero-bg-text">DAVYDOVV</h1>
            <div class="hero-container">
                <img src="hero.jpg" class="main-img">
            </div>
        </section>

        <section id="collection" class="horizontal-section">
            <div class="horizontal-wrapper">
                <div class="p-card">
                    <img src="onyx-polo.jpg">
                    <div class="p-info">
                        <h3 class="glitch" data-text="ONYX / RHINESTONES">ONYX / RHINESTONES</h3>
                        <p class="price">3500 RUB</p>
                    </div>
                </div>
                <div class="p-card">
                    <img src="white-polo.jpg">
                    <div class="p-info"><h3>WHITE / ARCHIVE</h3><p class="price">3333 RUB</p></div>
                </div>
            </div>
        </section>

        <section class="lookbook">
            <div class="grid">
                <img src="look1.jpg" class="reveal">
                <img src="look2.jpg" class="reveal">
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
